<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Competition Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .header p { opacity: 0.7; font-size: 1rem; }

        #leaderboard-container {
            width: 100%; max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .bar-wrapper { margin-bottom: 25px; }

        .bar-info {
            display: flex; justify-content: space-between;
            margin-bottom: 8px; font-weight: 600; font-size: 1.1rem;
        }

        .bar-bg {
            height: 35px; background: rgba(255,255,255,0.05);
            border-radius: 50px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }

        .bar-fill {
            height: 100%; width: 0%; border-radius: 50px;
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .rank-tag {
            background: rgba(0,0,0,0.3); padding: 2px 10px;
            border-radius: 10px; font-size: 0.8rem; margin-right: 10px;
        }

        /* Status label */
        #status { font-size: 0.8rem; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Leaderboard</h1>
        <p>Real-time Quiz Performance</p>
    </div>

    <div id="leaderboard-container">
        <div id="bars">
            <p style="text-align:center; opacity:0.5;">Waiting for participants...</p>
        </div>
    </div>

    <div id="status">Last synced: Never</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8cAX3_Rfe1zKCi9ayjYmoFQ7Msp1dCDMql2FJ4jTX9gqyzA53Wf2NjkfXrTT53Kv1/exec";
    const TOTAL_POINTS = 45; // Based on 1, 3, 5 point system

    // Distinct colorful palette
    const PALETTE = [
        'linear-gradient(90deg, #f87171, #ef4444)', // Red
        'linear-gradient(90deg, #fbbf24, #f59e0b)', // Amber
        'linear-gradient(90deg, #34d399, #10b981)', // Emerald
        'linear-gradient(90deg, #60a5fa, #3b82f6)', // Blue
        'linear-gradient(90deg, #818cf8, #6366f1)', // Indigo
        'linear-gradient(90deg, #a78bfa, #8b5cf6)', // Violet
        'linear-gradient(90deg, #f472b6, #ec4899)', // Pink
        'linear-gradient(90deg, #fb7185, #f43f5e)', // Rose
        'linear-gradient(90deg, #22d3ee, #06b6d4)', // Cyan
        'linear-gradient(90deg, #fb923c, #f97316)'  // Orange
    ];

    async function updateLeaderboard() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getRankings`);
            const data = await response.json();

            const container = document.getElementById('bars');
            
            if (data.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5;">No active participants yet.</p>`;
                return;
            }

            container.innerHTML = ""; // Clear current bars

            data.forEach((player, index) => {
                const percentage = (player.score / TOTAL_POINTS) * 100;
                // Loop through palette colors
                const color = PALETTE[index % PALETTE.length];

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                wrapper.innerHTML = `
                    <div class="bar-info">
                        <span><span class="rank-tag">#${index + 1}</span> ${player.name}</span>
                        <span>${player.score} Pts</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${percentage}%; background: ${color};"></div>
                    </div>
                `;
                container.appendChild(wrapper);
            });

            document.getElementById('status').innerText = `Last synced: ${new Date().toLocaleTimeString()}`;

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('status').innerText = "Sync Error: Retrying...";
        }
    }

    // Update every 3 seconds for live feel
    setInterval(updateLeaderboard, 3000);
    updateLeaderboard();
</script>
</body>
</html>
