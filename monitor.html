<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Competition Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 40px 20px;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }

        #leaderboard-container {
            width: 100%; max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            /* Height is handled by JavaScript */
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bars-area {
            position: relative;
            width: 100%;
        }

        .bar-wrapper {
            position: absolute;
            width: 100%;
            left: 0;
            /* This is what makes them slide past each other */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }

        .bar-info {
            display: flex; justify-content: space-between;
            margin-bottom: 8px; font-weight: 600; font-size: 1.1rem;
        }

        .bar-bg {
            height: 35px; background: rgba(255,255,255,0.05);
            border-radius: 50px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .bar-fill {
            height: 100%; width: 0%; border-radius: 50px;
            transition: width 1s cubic-bezier(0.1, 0.7, 0.1, 1), background 0.8s ease;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .rank-tag {
            background: rgba(0,0,0,0.3); padding: 2px 10px;
            border-radius: 10px; font-size: 0.8rem; margin-right: 10px;
        }

        .score-val {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .bump { transform: scale(1.3); color: #fff; }

        #status { font-size: 0.8rem; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Leaderboard</h1>
        <p>Dynamic Ranking Presentation</p>
    </div>

    <div id="leaderboard-container">
        <div id="bars-area">
            <p id="placeholder" style="text-align:center; opacity:0.5;">Awaiting synchronized data...</p>
        </div>
    </div>

    <div id="status">Syncing...</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8cAX3_Rfe1zKCi9ayjYmoFQ7Msp1dCDMql2FJ4jTX9gqyzA53Wf2NjkfXrTT53Kv1/exec";
    const TOTAL_POINTS = 45; 
    const SLOT_HEIGHT = 90; // Fixed vertical space for each player

    const PALETTE = [
        'linear-gradient(90deg, #f87171, #ef4444)', // 1st
        'linear-gradient(90deg, #fbbf24, #f59e0b)', // 2nd
        'linear-gradient(90deg, #34d399, #10b981)', // 3rd
        'linear-gradient(90deg, #60a5fa, #3b82f6)', 
        'linear-gradient(90deg, #818cf8, #6366f1)', 
        'linear-gradient(90deg, #a78bfa, #8b5cf6)', 
        'linear-gradient(90deg, #f472b6, #ec4899)', 
        'linear-gradient(90deg, #fb7185, #f43f5e)', 
        'linear-gradient(90deg, #22d3ee, #06b6d4)', 
        'linear-gradient(90deg, #fb923c, #f97316)'  
    ];

    async function updateLeaderboard() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getRankings`);
            const data = await response.json();
            const area = document.getElementById('bars-area');
            const placeholder = document.getElementById('placeholder');

            if (data.length > 0 && placeholder) placeholder.remove();

            // 1. Adjust the Main Container Height
            document.getElementById('leaderboard-container').style.height = (data.length * SLOT_HEIGHT) + "px";

            // 2. Track current active players to remove old ones
            const activeIds = data.map(p => "id-" + btoa(p.name).substring(0,10));

            data.forEach((player, index) => {
                const uniqueId = "id-" + btoa(player.name).substring(0,10);
                let wrapper = document.getElementById(uniqueId);
                const scorePct = (player.score / TOTAL_POINTS) * 100;
                const topPos = index * SLOT_HEIGHT;
                const color = PALETTE[index % PALETTE.length];

                if (!wrapper) {
                    // Create New Bar
                    wrapper = document.createElement('div');
                    wrapper.id = uniqueId;
                    wrapper.className = 'bar-wrapper';
                    wrapper.style.transform = `translateY(${topPos}px)`;
                    wrapper.style.opacity = "0";
                    
                    wrapper.innerHTML = `
                        <div class="bar-info">
                            <span><span class="rank-tag">#${index + 1}</span> ${player.name}</span>
                            <span class="score-val">${player.score} Pts</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width: 0%; background: ${color};"></div>
                        </div>
                    `;
                    area.appendChild(wrapper);
                    
                    // Fade in and grow bar
                    setTimeout(() => {
                        wrapper.style.opacity = "1";
                        wrapper.querySelector('.bar-fill').style.width = scorePct + "%";
                    }, 50);
                } else {
                    // Update Existing Bar Position and Data
                    wrapper.style.transform = `translateY(${topPos}px)`;
                    wrapper.querySelector('.rank-tag').innerText = `#${index + 1}`;
                    
                    const scoreEl = wrapper.querySelector('.score-val');
                    const fillEl = wrapper.querySelector('.bar-fill');

                    if (scoreEl.innerText !== `${player.score} Pts`) {
                        scoreEl.innerText = `${player.score} Pts`;
                        scoreEl.classList.add('bump');
                        setTimeout(() => scoreEl.classList.remove('bump'), 400);
                        
                        fillEl.style.width = scorePct + "%";
                        fillEl.style.background = color; // Morph color to new rank
                    }
                }
            });

            // 3. Remove players who are no longer in the top data
            document.querySelectorAll('.bar-wrapper').forEach(el => {
                if (!activeIds.includes(el.id)) {
                    el.style.opacity = "0";
                    el.style.transform += " scale(0.9)";
                    setTimeout(() => el.remove(), 600);
                }
            });

            document.getElementById('status').innerText = `Live • Last Update: ${new Date().toLocaleTimeString()}`;

        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Reconnecting to sheet...";
        }
    }

    setInterval(updateLeaderboard, 3000);
    updateLeaderboard();
</script>
</body>
</html>
