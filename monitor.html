<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE Leaderboard - Quiz Bee 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sky-blue: #60a5fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        #monitor-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 85%; max-width: 900px; padding: 50px;
            border-radius: 30px; border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
        }

        h1 { font-size: 2.5rem; font-weight: 700; text-align: center; margin: 0; color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .live-indicator {
            display: inline-block; width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
            margin-right: 10px; animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Chart Canvas Container */
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 40px; }

        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            border-radius: 30px; z-index: 10;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div style="text-align:center; margin-bottom: 20px;">
        <span class="live-indicator"></span>
        <span style="font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color: var(--sky-blue);">Official Monitor</span>
    </div>

<div id="monitor-container">
    <div id="loading" class="loading-overlay"><h2>Loading Live Data...</h2></div>
    
    <h1>Academic Elite Top 10</h1>
    
    <div class="chart-container">
        <canvas id="rankingChart"></canvas>
    </div>
</div>

<script>
    // CRITICAL: Replace with your Google Web App URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweH2MBd1eymUIsm6SGRsYTilVk7gGB53GB5tqVSUOICoG4GKV9z1lF-xH-CyyMucXs/exec"; 
    let rankingChart;

    // 1. Initialize the Chart
    function initChart() {
        const ctx = document.getElementById('rankingChart').getContext('2d');
        
        // Define Gradient for Bars
        const gradient = ctx.createLinearGradient(0, 0, 400, 0);
        gradient.addColorStop(0, '#60a5fa'); // Sky Blue
        gradient.addColorStop(1, '#1d4ed8'); // Dark Blue

        rankingChart = new Chart(ctx, {
            type: 'bar', // We use indexAxis: 'y' to make it horizontal
            data: {
                labels: [], // Participant Names
                datasets: [{
                    label: 'Score',
                    data: [], // Participant Scores
                    backgroundColor: gradient,
                    borderColor: 'rgba(255,255,255,0.2)',
                    borderWidth: 1,
                    borderRadius: 8,
                    barPercentage: 0.7
                }]
            },
            options: {
                indexAxis: 'y', // Makes the bars horizontal
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 1000, // Duration of the bar growth animation (ms)
                    easing: 'easeOutQuart'
                },
                plugins: {
                    legend: { display: false }, // Hide dataset label
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { family: 'Poppins', size: 14 },
                        bodyFont: { family: 'Poppins', size: 16, weight: 'bold' },
                        padding: 12,
                        cornerRadius: 10
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 15, // The quiz is out of 15
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.7)', font: { family: 'Poppins', size: 12 }, stepSize: 1 }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: 'white', font: { family: 'Poppins', size: 14, weight: '600' } }
                    }
                }
            }
        });
    }

    // 2. Function to Fetch Data and Update Chart
    async function updateData() {
        try {
            // Fetch rankings using the GET action we defined in Code.gs
            const response = await fetch(`${SCRIPT_URL}?action=getRankings`);
            const rankings = await response.json();

            if (!rankings || rankings.length === 0) return;

            // Prepare data for Chart.js
            const names = rankings.map(player => player.name);
            const scores = rankings.map(player => player.score);

            // Hide loading overlay on first successful load
            document.getElementById('loading').classList.add('hidden');

            // Update Chart Data
            rankingChart.data.labels = names;
            rankingChart.data.datasets[0].data = scores;
            
            // Trigger the animation update
            rankingChart.update();

        } catch (error) {
            console.error("Error fetching leaderboard:", error);
        }
    }

    // 3. Start the application
    window.onload = function() {
        initChart();
        updateData(); // Load initial data
        
        // Setup Auto-Refresh every 5 seconds (5000ms)
        setInterval(updateData, 5000); 
    }
</script>

</body>
</html>
