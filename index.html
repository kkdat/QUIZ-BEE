<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Quiz Bee 2026 - Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Blue Palette */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            --primary-blue: #3b82f6;
            --dark-blue: #1d4ed8;
            --sky-blue: #60a5fa;
            --success-green: #10b981;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-text: rgba(255, 255, 255, 0.95);
            --glass-muted: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--glass-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Glassmorphism Main Container */
        #quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 520px;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
        }

        h1 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 5px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        p.subtitle { text-align: center; color: var(--glass-muted); margin-bottom: 30px; font-size: 1rem; }

        /* Header & Progress (More Vibrant) */
        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .badge { padding: 5px 14px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: white; }
        .badge-easy { background: rgba(16, 185, 129, 0.3); border: 1px solid rgba(16, 185, 129, 0.5); }
        .badge-average { background: rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.5); }
        .badge-hard { background: rgba(239, 68, 68, 0.3); border: 1px solid rgba(239, 68, 68, 0.5); }
        
        .progress-container { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--sky-blue), var(--primary-blue)); border-radius: 10px; width: 0%; transition: width 0.4s ease-out; }

        /* Question Area */
        .question-area { min-height: 200px; }
        .question-text { font-size: 1.35rem; font-weight: 600; line-height: 1.4; margin-bottom: 20px; color: white; }
        .options-display { list-style: none; padding: 0; margin-bottom: 35px; }
        .options-display li { 
            padding: 14px 18px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); 
            border-radius: 15px; margin-bottom: 12px; font-size: 1rem; color: var(--glass-muted);
            backdrop-filter: blur(5px);
        }

        /* Glass Interaction Buttons (Special Effects) */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .choice-btn {
            aspect-ratio: 1/1; border: 1px solid var(--glass-border); border-radius: 20px;
            background: rgba(255,255,255,0.03); font-size: 1.5rem; font-weight: 700; color: white;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .choice-btn:hover { 
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); 
        }
        .choice-btn:active { transform: translateY(0px); }

        /* Glass Inputs & Primary Blue Button */
        input[type="text"] {
            width: 100%; padding: 16px 22px; border-radius: 15px; border: 1px solid var(--glass-border);
            font-size: 1.1rem; margin-bottom: 25px; outline: none; transition: 0.2s;
            background: rgba(255,255,255,0.03); color: white;
        }
        input[type="text"]:focus { border-color: var(--primary-blue); background: rgba(59, 130, 246, 0.05); }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }

        .primary-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 600; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.1rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .primary-btn:hover { opacity: 0.9; transform: scale(1.01); }

        /* End Screen Glass Polish */
        .status-msg { font-weight: 600; color: var(--success-green); margin-top: 25px; font-size: 1.1rem; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .loader-ring { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: var(--sky-blue); animation: spin 1s ease-in-out infinite; margin: 20px auto; }

        /* Utility Classes */
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen" class="fade-in">
        <h1>Academic Elite</h1>
        <p class="subtitle">Quiz Bee Challenge 2026</p>
        <input type="text" id="username" placeholder="Registration Name" autocomplete="off">
        <button class="primary-btn" onclick="startQuiz()">Launch Quiz</button>
    </div>

    <div id="quiz-content" class="hidden">
        <div class="header-meta">
            <span id="diff-badge" class="badge">Easy</span>
            <span id="q-counter" style="font-size: 0.9rem; font-weight: 600; color: var(--glass-muted);">Q 1 / 15</span>
        </div>
        <div class="progress-container">
            <div id="bar" class="progress-fill"></div>
        </div>

        <div class="question-area fade-in" id="q-frame">
            <div id="q-text" class="question-text"></div>
            <ul id="opt-list" class="options-display"></ul>
        </div>

        <div class="btn-grid">
            <button class="choice-btn" onclick="handleSelect('A')">A</button>
            <button class="choice-btn" onclick="handleSelect('B')">B</button>
            <button class="choice-btn" onclick="handleSelect('C')">C</button>
            <button class="choice-btn" onclick="handleSelect('D')">D</button>
        </div>
    </div>

    <div id="end-screen" class="hidden" style="text-align:center;">
        <div id="loader">
            <h2 style="color:white;">Securely Logging...</h2>
            <div class="loader-ring"></div>
            <p style="color:var(--glass-muted);">Connecting to central registry</p>
        </div>
        <div id="final-stats" class="hidden fade-in">
            <h2 style="font-size: 2.2rem; color: white; margin-bottom: 10px;">Submission Verified</h2>
            <p id="score-text" style="font-size: 1.3rem; color: var(--glass-muted); line-height: 1.5;"></p>
            <p class="status-msg">Your performance has been officially recorded.</p>
            <button class="primary-btn" style="margin-top: 35px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);" onclick="location.reload()">Reset Portal</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE"; // PASTE YOUR URL HERE

    const questions = [
        {q: "What is the powerhouse of the cell?", options: ["A. Nucleus", "B. Mitochondria", "C. Ribosome", "D. Golgi Body"], correct: "B", level: "Easy"},
        {q: "Which planet is known as the Red Planet?", options: ["A. Venus", "B. Mars", "C. Jupiter", "D. Saturn"], correct: "B", level: "Easy"},
        {q: "What is the result of 15 + 27?", options: ["A. 42", "B. 32", "C. 44", "D. 39"], correct: "A", level: "Easy"},
        {q: "How many colors are in a rainbow?", options: ["A. 6", "B. 8", "C. 7", "D. 9"], correct: "C", level: "Easy"},
        {q: "Who is the primary author of the Declaration of Independence?", options: ["A. Washington", "B. Franklin", "C. Jefferson", "D. Adams"], correct: "C", level: "Easy"},
        {q: "What is the chemical symbol for Gold?", options: ["A. Gd", "B. Ag", "C. Au", "D. Fe"], correct: "C", level: "Average"},
        {q: "Largest country by land area?", options: ["A. China", "B. Canada", "C. Russia", "D. USA"], correct: "C", level: "Average"},
        {q: "Square root of 225?", options: ["A. 13", "B. 14", "C. 15", "D. 16"], correct: "C", level: "Average"},
        {q: "Who wrote 'Hamlet'?", options: ["A. Marlowe", "B. Dickens", "C. Shakespeare", "D. Austen"], correct: "C", level: "Average"},
        {q: "Largest ocean on Earth?", options: ["A. Atlantic", "B. Indian", "C. Pacific", "D. Arctic"], correct: "C", level: "Average"},
        {q: "Pi rounded to 4 decimal places?", options: ["A. 3.1415", "B. 3.1416", "C. 3.1414", "D. 3.1417"], correct: "B", level: "Hard"},
        {q: "Which element is atomic number 79?", options: ["A. Platinum", "B. Gold", "C. Mercury", "D. Lead"], correct: "B", level: "Hard"},
        {q: "Capital of Kazakhstan?", options: ["A. Almaty", "B. Astana", "C. Tashkent", "D. Bishkek"], correct: "B", level: "Hard"},
        {q: "Year the French Revolution began?", options: ["A. 1776", "B. 1789", "C. 1799", "D. 1804"], correct: "B", level: "Hard"},
        {q: "Rarest human blood type?", options: ["A. O negative", "B. AB negative", "C. Rh-null", "D. B positive"], correct: "C", level: "Hard"}
    ];

    let current = 0;
    let score = 0;
    let logs = [];
    let uName = "";

    function startQuiz() {
        uName = document.getElementById('username').value.trim();
        if(!uName) return alert("Name is required.");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        render();
    }

    function render() {
        const q = questions[current];
        const frame = document.getElementById('q-frame');
        
        frame.classList.remove('fade-in');
        void frame.offsetWidth; // Reset animation
        frame.classList.add('fade-in');

        document.getElementById('q-counter').innerText = `Q ${current + 1} / 15`;
        document.getElementById('bar').style.width = `${((current + 1)/15)*100}%`;
        
        const badge = document.getElementById('diff-badge');
        badge.innerText = q.level;
        badge.className = `badge badge-${q.level.toLowerCase()}`;

        document.getElementById('q-text').innerText = q.q;
        document.getElementById('opt-list').innerHTML = q.options.map(o => `<li>${o}</li>`).join('');
    }

    async function handleSelect(ans) {
        const isCorrect = ans === questions[current].correct;
        if(isCorrect) score++;
        logs.push(isCorrect ? "Correct" : "Incorrect");

        if(current < 14) {
            current++;
            render();
        } else {
            finish();
        }
    }

    async function finish() {
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');

        try {
            // Using POST with no-cors to bridge domains (GitHub -> Google Sheets)
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: uName, score: score, details: logs })
            });
            
            // Artificial delay for professional feel
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('final-stats').classList.remove('hidden');
                document.getElementById('score-text').innerText = `Challenge complete, ${uName}. Final Score: ${score} / 15.`;
            }, 1800);
        } catch (e) {
            document.getElementById('loader').innerHTML = `<h2 style="color:#ef4444;">Connection Alert</h2><p>Data may not have synchronized properly. Keep this window open and notify coordinator.</p>`;
        }
    }
</script>
</body>
</html>
