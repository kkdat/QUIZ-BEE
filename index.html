<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Quiz Bee - Competition Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary-blue: #3b82f6;
            --success-green: #10b981;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        #quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 90%; max-width: 500px; padding: 40px;
            border-radius: 30px; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px; 
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); 
            color: white; margin-bottom: 15px; box-sizing: border-box; outline: none;
            font-family: inherit;
        }
        input:focus { border-color: var(--primary-blue); }

        .primary-btn {
            width: 100%; padding: 15px; background: var(--primary-blue); color: white;
            border: none; border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .primary-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .proceed-btn { background: var(--success-green); margin-top: 10px; }

        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-easy { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-average { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .badge-hard { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); transition: width 0.5s; width: 0%; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .choice-btn {
            aspect-ratio: 1/1; border: 1px solid var(--glass-border); border-radius: 15px;
            background: rgba(255,255,255,0.05); color: white; font-weight: 700; cursor: pointer; transition: 0.2s;
            font-size: 1.2rem;
        }
        .choice-btn:hover { background: var(--primary-blue); transform: scale(1.05); }

        .hidden { display: none; }
        .fade { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .reg-success { color: var(--success-green); font-weight: 600; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="reg-screen" class="fade">
        <h1 style="text-align:center; margin:0;">KKDAT Quiz Bee</h1>
        <p style="text-align:center; opacity:0.7; margin-bottom:30px;">Where knowledge turns to application</p>
        
        <div id="form-group">
            <input type="text" id="username" placeholder="Assigned Username">
            <input type="password" id="userpass" placeholder="Unique Password">
            <button class="primary-btn" id="reg-btn" onclick="registerUser()">Verify Identity</button>
        </div>

        <div id="proceed-group" class="hidden" style="text-align:center;">
            <span class="reg-success">✓ Access Granted & Synced</span>
            <button class="primary-btn proceed-btn" onclick="startQuiz()">Begin Quiz Now</button>
        </div>
    </div>

    <div id="quiz-content" class="hidden fade">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="diff-badge" class="badge">Easy</span>
            <span id="q-counter" style="font-size:0.8rem; opacity:0.6;">Q 1/15</span>
        </div>
        <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        <h2 id="q-text" style="min-height:80px; font-size:1.2rem;"></h2>
        <ul id="opt-list" style="list-style:none; padding:0; margin-bottom:30px; opacity:0.8; font-size:0.9rem;"></ul>
        <div class="btn-grid">
            <button class="choice-btn" onclick="select('A')">A</button>
            <button class="choice-btn" onclick="select('B')">B</button>
            <button class="choice-btn" onclick="select('C')">C</button>
            <button class="choice-btn" onclick="select('D')">D</button>
        </div>
    </div>

    <div id="ranking-screen" class="hidden fade" style="text-align:center;">
        <h2 id="rank-title">Round Rankings</h2>
        <div style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 20px;">
            <p style="font-size: 0.8rem; opacity: 0.6; margin: 0;">YOUR CURRENT RANK</p>
            <div id="my-rank" style="font-size: 3.5rem; font-weight: 800; color: #60a5fa;">#--</div>
            <p id="my-score" style="margin: 5px 0 0 0; font-weight: 600;"></p>
        </div>
        <button class="primary-btn" onclick="nextRound()">Next Round</button>
    </div>

    <div id="end-screen" class="hidden fade" style="text-align:center;">
        <h2>Quiz Complete</h2>
        <p id="final-msg" style="margin-bottom:20px;"></p>
        <button class="primary-btn" style="background:rgba(255,255,255,0.1);" onclick="location.reload()">Exit Portal</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0t6H9OTJWWaocKyQclRXWjbfyGCgSF_uIclNiZCqKjzkerTrZVTL4TZXXx_H3BHa1/exec";

    const AUTHORIZED_USERS = {
        "Student_01": "Pass1",
        "Student_02": "Pass2",
        "Admin": "Master"
    };

    // Weighted Scoring Values
    const POINTS = { "Easy": 1, "Average": 3, "Hard": 5 };

    const questions = [
        {q: "KKDAT meaning", options: ["A. Kabataan Kontra Droga At Terorismo", "B. Kaibigan Kontra Droga at Terorismo", "C. Kabarkada Kontra Droga At Terorismo", "D. Kabataan Kalaban sa Droga at Terorismo"], correct: "A", level: "Easy"},
        {q: "When was the KKDAT Ilocandia Inc.-Currimao founded?", options: ["A. March 2, 2019", "B. March 2, 2020", "C. March 2, 2021", "D. March 2, 2022"], correct: "B", level: "Easy"},
        {q: "What is the basis of the building of KKDAT organization?", options: ["A. PNP CMC 20-2019", "B. PNP CMC 21-2019", "C. EO 66", "D. EO 70"], correct: "A", level: "Easy"},
        {q: "What government agency founded the KKDAT?", options: ["A. PNP", "B. PDEA", "C. NICA", "D. Phil. Army"], correct: "C", level: "Easy"},
        {q: "Author of Declaration of Independence?", options: ["A. Washington", "B. Franklin", "C. Jefferson", "D. Adams"], correct: "C", level: "Easy"},
        {q: "Chemical symbol for Gold?", options: ["A. Gd", "B. Ag", "C. Au", "D. Fe"], correct: "C", level: "Average"},
        {q: "Largest country area?", options: ["A. China", "B. Canada", "C. Russia", "D. USA"], correct: "C", level: "Average"},
        {q: "Square root of 225?", options: ["A. 13", "B. 14", "C. 15", "D. 16"], correct: "C", level: "Average"},
        {q: "Who wrote 'Hamlet'?", options: ["A. Marlowe", "B. Dickens", "C. Shakespeare", "D. Austen"], correct: "C", level: "Average"},
        {q: "Largest ocean?", options: ["A. Atlantic", "B. Indian", "C. Pacific", "D. Arctic"], correct: "C", level: "Average"},
        {q: "Pi to 4 decimal places?", options: ["A. 3.1415", "B. 3.1416", "C. 3.1414", "D. 3.1417"], correct: "B", level: "Hard"},
        {q: "Atomic number 79?", options: ["A. Platinum", "B. Gold", "C. Mercury", "D. Lead"], correct: "B", level: "Hard"},
        {q: "Capital of Kazakhstan?", options: ["A. Almaty", "B. Astana", "C. Tashkent", "D. Bishkek"], correct: "B", level: "Hard"},
        {q: "Year French Revolution began?", options: ["A. 1776", "B. 1789", "C. 1799", "D. 1804"], correct: "B", level: "Hard"},
        {q: "Rarest human blood type?", options: ["A. O-", "B. AB-", "C. Rh-null", "D. B+"], correct: "C", level: "Hard"}
    ];

    let current = 0;
    let score = 0;
    let logs = [];
    let uName = "";

    // --- LOGIC ---

    async function syncToSheet(currentScore, details) {
        // "text/plain" is used to bypass CORS pre-flight browser blocks
        return fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ name: uName, score: currentScore, details: details })
        });
    }

    async function registerUser() {
        const nameInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('userpass').value.trim();

        if (AUTHORIZED_USERS[nameInput] && AUTHORIZED_USERS[nameInput] === passInput) {
            uName = nameInput;
            const regBtn = document.getElementById('reg-btn');
            regBtn.innerText = "Syncing...";
            regBtn.disabled = true;

            try {
                // Send Registration Ping (0 points)
                await syncToSheet(0, ["Registration Success"]);
                document.getElementById('form-group').classList.add('hidden');
                document.getElementById('proceed-group').classList.remove('hidden');
            } catch (e) {
                alert("Connection failed. Check your internet.");
                regBtn.innerText = "Verify Identity";
                regBtn.disabled = false;
            }
        } else {
            alert("❌ Invalid credentials.");
        }
    }

    function startQuiz() {
        document.getElementById('reg-screen').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        render();
    }

    function render() {
        const q = questions[current];
        document.getElementById('diff-badge').innerText = q.level;
        document.getElementById('diff-badge').className = `badge badge-${q.level.toLowerCase()}`;
        document.getElementById('q-counter').innerText = `Q ${current + 1}/15`;
        document.getElementById('bar').style.width = `${((current + 1)/15)*100}%`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('opt-list').innerHTML = q.options.map(o => `<li>${o}</li>`).join('');
    }

    async function select(ans) {
        const q = questions[current];
        const isCorrect = ans === q.correct;
        
        // Apply points based on category
        if(isCorrect) {
            score += POINTS[q.level];
        }
        logs.push(isCorrect ? "Correct" : "Incorrect");

        const qNum = current + 1;
        if(qNum === 5 || qNum === 10) {
            await showRankings(`Round Over: ${q.level}`);
        } else if (qNum === 15) {
            finish();
        } else {
            current++;
            render();
        }
    }

    async function showRankings(title) {
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('ranking-screen').classList.remove('hidden');
        document.getElementById('rank-title').innerText = title;
        document.getElementById('my-score').innerText = `Total Points: ${score} / 45`;

        await syncToSheet(score, logs);

        try {
            const res = await fetch(`${SCRIPT_URL}?action=getMyStatus&name=${encodeURIComponent(uName)}`);
            const data = await res.json();
            document.getElementById('my-rank').innerText = `#${data.rank}`;
        } catch(e) { document.getElementById('my-rank').innerText = "--"; }
    }

    function nextRound() {
        current++;
        document.getElementById('ranking-screen').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        render();
    }

    async function finish() {
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-msg').innerText = `${uName}, your final points total is ${score}/45.`;
        await syncToSheet(score, logs);
    }
</script>
</body>
</html>
